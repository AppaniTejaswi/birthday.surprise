<style>

        background-color: #d62828; /* The red background from the video */
        height: 100vh;

        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        position: relative;
        overflow: hidden;
    }

    .polaroid-frame {
        background: white;
        padding: 15px 15px 60px 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        transform: rotate(-5deg); /* Slight tilt like the video */
        margin-bottom: 20px;
    }

    .polaroid-frame img {
        width: 250px;
        height: 300px;
        object-fit: cover;
    }

    .birthday-text {
        font-family: 'Dancing Script', cursive; /* Use a script font */
        font-size: 3.5rem;
        margin: 10px 0;
        text-align: center;
    }

    .back-button {
        position: absolute;
        bottom: 30px;
        right: 40px;
        background: #f9d423;
        color: #333;
        padding: 10px 25px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
    }
</style>

<div class="letter-page">
    <div class="polaroid-frame">
